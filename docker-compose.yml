version: '3.8'

services:
  db:
    image: postgres:16
    container_name: crowdfunding-db
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crowdfunding_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crowdfunding-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crowdfunding-backend
    env_file:
      - .env.docker
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - crowdfunding-network
    restart: unless-stopped

  rag:
    build:
      context: ./RAG
      dockerfile: Dockerfile
    container_name: crowdfunding-rag
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./RAG:/app
      - /app/__pycache__
      - ./RAG/chroma_db:/app/chroma_db
    networks:
      - crowdfunding-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://localhost:5000}
        - VITE_RAG_URL=${VITE_RAG_URL:-http://localhost:8000}
        - VITE_CLOUDINARY_UPLOAD_PRESET=${VITE_CLOUDINARY_UPLOAD_PRESET}
        - VITE_CLOUDINARY_CLOUD_NAME=${VITE_CLOUDINARY_CLOUD_NAME}
    container_name: crowdfunding-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - rag
    networks:
      - crowdfunding-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  crowdfunding-network:
    driver: bridge
